--- 
version: 5

defaults:
  datadir: "data"
  lookup_key: eyaml_lookup_key
  options:
    pkcs7_private_key: /etc/puppetlabs/puppet/eyaml/keys/private_key.pkcs7.pem
    pkcs7_public_key:  /etc/puppetlabs/puppet/eyaml/keys/public_key.pkcs7.pem

hierarchy:
  - name: "SCE Data"
    paths:
      #- "sce/role/%{os.name}.%{os.release.major}.%{trusted.extensions.pp_role}.%{trusted.extensions.pp_environment}.yaml"  # /sce/role/ubuntu.22.04.web.development.yaml
      #- "sce/role/%{os.name}.%{os.release.major}.%{trusted.extensions.pp_role}.yaml"                                       # /sce/role/ubuntu.22.04.web.yaml
      - "sce/os/%{os.name}/%{os.release.major}.yaml"
      - "sce/common.yaml"
  - name: "Yaml backend"
    paths:
      - "nodes/%{trusted.certname}.yaml"
      - "kernel/%{kernel}.yaml"
      - "roles/%{trusted.extensions.pp_role}.yaml"
      - "common.yaml"
