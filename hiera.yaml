--- 
version: 5

defaults:
  datadir: "data"
  lookup_key: eyaml_lookup_key
  options:
    pkcs7_private_key: /etc/puppetlabs/puppet/eyaml/keys/private_key.pkcs7.pem
    pkcs7_public_key:  /etc/puppetlabs/puppet/eyaml/keys/public_key.pkcs7.pem

hierarchy:
  - name: "SCE Data"
    paths:
      - "sce/nodes/%{trusted.certname}.yaml"                     # /sce/nodes/webserver01.yaml
      - "sce/role/%{trusted.extensions.pp_role}.yaml"            # /sce/role/dev_wkst.yaml
      - "sce/os/%{os.name}/%{os.release.major}_%{os_type}.yaml"  # /sce/os/ubuntu/22.04_workstation.yaml
  - name: "Yaml backend"
    paths:
      - "nodes/%{trusted.certname}.yaml"
      - "kernel/%{kernel}.yaml"
      - "roles/%{trusted.extensions.pp_role}.yaml"
      - "common.yaml"
