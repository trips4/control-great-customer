profile::cis::sce::enforce: false

lookup_options:
  sce_linux::grub2_superuser_password:
    convert_to: 'Sensitive'
# Grub2 configuration    
sce_linux::regenerate_grub2_config: true
sce_linux::set_grub2_password: false
sce_linux::grub2_superuser: 'root'
sce_linux::grub2_superuser_password: 'MyEncryptedPassword'

# Add SCE Controls here
sce_linux::config:
  profile: 'server'
  level: '1'

  only:
    - 1.1.1.1
    - 1.1.1.9   # Ensure usb-storage kernel module is not available.Managed via 'profile::cis::ubuntu::usb_disable'
    - 1.1.2.1.1 # Ensure /tmp is tmpfs or a separate partition
    - 1.1.2.2.4 # Ensure noexec option set on /dev/shm partition