profile::cis::sce::enforce: false

lookup_options:
  sce_linux::grub2_superuser_password:
    convert_to: 'Sensitive'
# Grub2 configuration    
sce_linux::regenerate_grub2_config: true
sce_linux::set_grub2_password: false
sce_linux::grub2_superuser: 'root'
sce_linux::grub2_superuser_password: 'MyEncryptedPassword'

# Add SCE Controls here
sce_linux::config:
  profile: 'server'
  level: '2'

  only:
    - 1.1.1.1
    - 1.1.1.9   # Ensure usb-storage kernel module is not available. Managed via 'profile::cis::ubuntu::usb_disable'
    - 1.1.2.2.4 # Ensure noexec option set on /dev/shm partition
    - 1.3.1.1   # Ensure the apparmor packages are installed.  Managed via 'profile::cis::apparmor'
    - 1.5.1     #Ensure randomize_va_space is configured
    - 1.5.3     # Ensure suid_dumpable is configured. Managed via 'profile::cis::suid_dumpable' to satisfy v3 check.
    - 1.5.5     # Ensure Automatic Error Reporting is not enabled. This is 1.5.6 in v3, but 1.5.5 in v2.
    - 1.6.2     # Ensure /etc/issue is configured
    - 2.2.4     # Ensure telnet client is not installed
    - 2.2.6     # Ensure ftp client is not installed. Managed via 'profile::cis::ftp'
    - 2.4.1.2   # Ensure access to /etc/crontab is configured
    - 2.4.1.3   # Ensure access to /etc/cron.hourly is configured
    - 2.4.1.4   # Ensure access to /etc/cron.daily is configured
    - 2.4.1.5   # Ensure permissions on /etc/cron.weekly are configured
    - 2.4.1.6   # Ensure permissions on /etc/cron.monthly are configured
    #- 2.4.1.8   # Ensure crontab is restricted to authorized users # Managed via 'profile::cis::crond_access' to satisfy v3 check.
    # Add SCE Controls here
    - 3.2.1     # Ensure dccp kernel module is not available.  In CIS V2 this control is L2, but in V3 it is L1.
    # - 3.2.2     # Ensure tipc kernel module is not available
    # - 3.2.4     # Ensure sctp kernel module is not available