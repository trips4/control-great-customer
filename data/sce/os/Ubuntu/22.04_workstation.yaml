profile::cis::sce::enforce: true

sce_linux::regenerate_grub2_config: true
sce_linux::set_grub2_password: true
sce_linux::grub2_superuser: 'root'
sce_linux::grub2_superuser_password: 'ENC[PKCS7,]'
lookup_options:
  sce_linux::grub2_superuser_password:
    convert_to: 'Sensitive'
sce_linux::benchmark: 'cis'
sce_linux::config:
  profile: 'workstation'
  level: '1'
  ignore:
    # ## AIDE controls are not applicable to workstations, as they are typically used for servers.
    - 'ensure_aide_is_installed'
    - 'ensure_filesystem_integrity_is_regularly_checked'
    - 'ensure_cryptographic_mechanisms_are_used_to_protect_the_integrity_of_audit_tools'

    ### The controls below require SSHD package to be installed on host.  SCE will not run correctly 
     ## without SSHD.  It is not an option.
    # - 'ensure_permissions_on_etcsshsshd_config_are_configured' # 5.1.1
    # - 'ensure_permissions_on_ssh_private_host_key_files_are_configured' # 5.1.2
    # - 'ensure_permissions_on_ssh_public_host_key_files_are_configured' # 5.1.3
    # - 'ensure_sshd_access_is_configured' # 5.1.4
    # - 'ensure_sshd_banner_is_configured' # 5.1.5
    # - 'ensure_sshd_ciphers_are_configured' # 5.1.6
    # - 'ensure_sshd_clientaliveinterval_and_clientalivecountmax_are_configured' # 5.1.7
    # - 'ensure_sshd_disableforwarding_is_enabled' # 5.1.8
    # - 'ensure_sshd_gssapiauthentication_is_disabled' # 5.1.9
    # - 'ensure_sshd_hostbasedauthentication_is_disabled'   # 5.1.10
    # - 'ensure_sshd_ignorerhosts_is_enabled' # 5.1.11
    # - 'ensure_sshd_kexalgorithms_are_configured' # 5.1.12
    # - 'ensure_sshd_logingracetime_is_configured' # 5.1.13
    # - 'ensure_sshd_loglevel_is_configured' # 5.1.14
    # - 'ensure_sshd_macs_are_configured' # 5.1.15
    # - 'ensure_sshd_maxauthtries_is_configured' # 5.1.16
    # - 'ensure_sshd_maxsessions_is_configured' # 5.1.17
    # - 'ensure_sshd_maxstartups_is_configured' # 5.1.18
    # - 'ensure_sshd_permitemptypasswords_is_disabled' # 5.1.19
    # - 'ensure_sshd_permitrootlogin_is_disabled' # 5.1.20
    # - 'ensure_sshd_permituserenvironment_is_disabled' # 5.1.21
    # - 'ensure_sshd_usepam_is_enabled' # 5.1.22
