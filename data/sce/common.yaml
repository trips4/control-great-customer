lookup_options:
  sce_windows::config:
    merge:
      strategy: deep
  sce_linux::config:
    merge:
      strategy: deep

profile::cis::sce::enforce: false

sce_linux::config:
  control_configs:
    ensure_sshd_access_is_configured:
      allow_groups: ['sudo']
sce_windows::config:
  profile: 'member_server' 
  level: '1'
  control_configs:
    ensure_deny_log_on_through_remote_desktop_services_is_set_to_guests_local_account_ms_only:
      users: ['Builtin\Guests']