lookup_options:
  sce_windows::config:
    merge:
      strategy: deep
  sce_linux::config:
    merge:
      strategy: deep

profile::cis::sce::enforce: false

sce_linux::config:
  control_configs:
    ensure_sshd_access_is_configured:
      allow_groups: ['sudo']
    # Ensure crontab is restricted to authorized users  
    2.4.1.8:
      purge_cron_deny: false
      manage_cron_allow: true
      cron_allowlist: ['root','ubuntu']
sce_windows::config:
  control_configs:
    ensure_enforce_password_history_is_set_to_24_or_more_passwords:
      dsc_enforce_password_history: 24