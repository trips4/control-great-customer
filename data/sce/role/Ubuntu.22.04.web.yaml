profile::cis::sce::enforce: true
lookup_options:
  sce_linux::config:
    merge:
      strategy: deep
sce_linux::config:
  ignore:
     - 'ensure_aide_is_installed' #6.1.1
     - 'ensure_filesystem_integrity_is_regularly_checked' #6.1.2
     - 'ensure_cryptographic_mechanisms_are_used_to_protect_the_integrity_of_audit_tools'
     - 'ensure_bootloader_password_is_set' # 1.4.1
     - 'ensure_apparmor_is_enabled_in_the_bootloader_configuration' # 1.3.1.2
     - 'ensure_access_to_bootloader_config_is_configured' #1.4.2